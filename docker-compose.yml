services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build: ./backend
    container_name: agentrag-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant

  frontend:
    build: ./frontend
    container_name: agentrag-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  qdrant_storage: